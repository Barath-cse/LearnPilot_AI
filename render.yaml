services:
  # Spring Boot Backend Web Service
  - type: web
    name: learnpilot-backend
    env: java
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/demo-0.0.1-SNAPSHOT.jar
    rootDir: backend
    envVars:
      - key: PORT
        value: 8080
      - key: MONGO_URI
        value: mongodb+srv://barathash77_db_user:N51iKCTt2PMxcaHr@cluster0.mhew8wh.mongodb.net/learnpilot?appName=Cluster0
      - key: GROQ_API_KEY
        # IMPORTANT: Replace this with your actual Groq API Key
        sync: false

  # React Frontend Static Site
  - type: web
    name: learnpilot-frontend
    env: static
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        # This automatically points the frontend to the backend URL generated by Render
        fromService:
          type: web
          name: learnpilot-backend
          envVarKey: RENDER_EXTERNAL_URL
